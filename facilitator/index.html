<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Room — Facilitator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .screen.active { display: flex; }
    h1 { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.9); }
    .sub { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.6; }
    .session-code { font-size: 48px; font-weight: 700; letter-spacing: 0.12em; }
    .join-url { font-size: 13px; color: rgba(255,255,255,0.4); }
    #qr-container { background: #fff; padding: 12px; border-radius: 8px; line-height: 0; }
    .count { font-size: 12px; color: rgba(255,255,255,0.3); }
    .count span { color: rgba(255,255,255,0.7); font-weight: 600; }
    .live-row { display: flex; align-items: center; gap: 8px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #6ee7a0; }
    .live-label { font-size: 12px; color: #6ee7a0; letter-spacing: 0.08em; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.7; }
    .btn-primary { background: #fff; color: #111; }
    .btn-danger {
      background: transparent;
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.3);
    }
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybMZwfF_MsWWLRETtzKv9rTI29EebZ73pLun4Nn8vIpXRuBNW4jePLNfOrxdSZX8Wz/exec';
  </script>

  <div id="screen-create" class="screen active">
    <h1>The Room</h1>
    <input
      type="text"
      id="session-name-input"
      placeholder="Session name (optional)"
      autocomplete="off"
      style="
        width:100%;
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.12);
        border-radius:10px;
        padding:14px 16px;
        font-size:15px;
        color:#fff;
        text-align:center;
        outline:none;
        -webkit-appearance:none;
        font-family:inherit;
      "
    >
    <button class="btn-primary" id="btn-create" onclick="createSession()">Create session</button>
  </div>

  <div id="screen-waiting" class="screen">
    <div id="name-waiting" class="sub" style="min-height:1em"></div>
    <div id="code-waiting" class="session-code"></div>
    <div id="url-waiting" class="join-url"></div>
    <div id="qr-container"><div id="qr"></div></div>
    <div class="count"><span id="count-waiting">0</span> joined</div>
    <button class="btn-primary" onclick="startSession()">Start session</button>
  </div>

  <div id="screen-running" class="screen">
    <div id="name-running" class="sub" style="min-height:1em"></div>
    <div id="code-running" class="session-code" style="font-size:32px"></div>
    <div class="live-row">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
    </div>
    <div class="count"><span id="count-running">0</span> responding</div>
    <div id="transcription-warning" style="display:none;font-size:11px;color:rgba(255,255,255,0.3);text-align:center">
      Live transcription requires Chrome with microphone access
    </div>
    <div class="divider"></div>
    <button class="btn-danger" onclick="stopSession()">Stop session</button>
  </div>

  <div id="screen-analysis" class="screen">
    <div id="analysis-meta" class="sub"></div>
    <div style="display:flex;gap:12px;width:100%;align-items:flex-start">
      <div id="analysis-sidebar" style="width:48px;flex-shrink:0"></div>
      <div id="analysis-transcript" style="flex:1;font-size:13px;line-height:2.0;color:rgba(255,255,255,0.75)"></div>
    </div>
    <button class="btn-secondary" onclick="newSession()">New session</button>
  </div>

  <script>
    var session = null;
    var pollTimer = null;
    var recognition = null;

    document.getElementById('session-name-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') createSession();
    });

    function api(params) {
      return fetch(SCRIPT_URL + '?' + new URLSearchParams(params).toString())
        .then(function(r) { return r.json(); });
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    function clearQr() {
      var el = document.getElementById('qr');
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function computeBuckets(rows) {
      var BUCKET_MS = 5000;
      var times = rows.map(function(r) { return Date.parse(r.timestamp); });
      var t0 = Math.min.apply(null, times);
      var tEnd = Math.max.apply(null, times);
      var totalMs = Math.max(tEnd - t0, 1);
      var raw = {};
      rows.forEach(function(r) {
        var idx = Math.floor((Date.parse(r.timestamp) - t0) / BUCKET_MS);
        if (!raw[idx]) raw[idx] = [];
        raw[idx].push(parseFloat(r.value));
      });
      var buckets = {};
      var lowestIdx = null, lowestAvg = Infinity;
      Object.keys(raw).forEach(function(idx) {
        var vals = raw[idx];
        var avg = vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
        buckets[parseInt(idx, 10)] = avg;
        if (avg < lowestAvg) { lowestAvg = avg; lowestIdx = parseInt(idx, 10); }
      });
      return { buckets: buckets, t0: t0, totalMs: totalMs, lowestIdx: lowestIdx, lowestAvg: lowestAvg };
    }

    function buildSidebar(rows, H, computed) {
      var W = 48, BUCKET_MS = 5000;
      var buckets = computed.buckets, t0 = computed.t0, totalMs = computed.totalMs;
      var lowestIdx = computed.lowestIdx, lowestAvg = computed.lowestAvg;

      var participants = {};
      rows.forEach(function(r) {
        if (!participants[r.participant]) participants[r.participant] = [];
        participants[r.participant].push({
          offsetMs: Date.parse(r.timestamp) - t0,
          value: parseFloat(r.value)
        });
      });

      function makeVerticalPath(pts) {
        var sorted = pts.slice().sort(function(a, b) { return a.offsetMs - b.offsetMs; });
        var mapped = sorted.map(function(p) {
          return {
            x: p.value * W,
            y: Math.min((p.offsetMs / totalMs) * H, H)
          };
        });
        if (!mapped.length) return '';
        var d = 'M' + mapped[0].x.toFixed(1) + ',' + mapped[0].y.toFixed(1);
        for (var i = 1; i < mapped.length; i++) {
          var cy = ((mapped[i - 1].y + mapped[i].y) / 2).toFixed(1);
          d += ' C' + mapped[i - 1].x.toFixed(1) + ',' + cy
            + ' ' + mapped[i].x.toFixed(1) + ',' + cy
            + ' ' + mapped[i].x.toFixed(1) + ',' + mapped[i].y.toFixed(1);
        }
        return d;
      }

      var avgPts = Object.keys(buckets).map(function(idx) {
        return {
          x: buckets[parseInt(idx, 10)] * W,
          y: Math.min(((parseInt(idx, 10) + 0.5) * BUCKET_MS / totalMs) * H, H)
        };
      }).sort(function(a, b) { return a.y - b.y; });

      function makeAvgPath(pts) {
        if (!pts.length) return '';
        var d = 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1);
        for (var i = 1; i < pts.length; i++) {
          var cy = ((pts[i - 1].y + pts[i].y) / 2).toFixed(1);
          d += ' C' + pts[i - 1].x.toFixed(1) + ',' + cy
            + ' ' + pts[i].x.toFixed(1) + ',' + cy
            + ' ' + pts[i].x.toFixed(1) + ',' + pts[i].y.toFixed(1);
        }
        return d;
      }

      var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg"'
        + ' style="width:' + W + 'px;height:' + H + 'px;display:block">';
      svg += '<rect width="' + W + '" height="' + H + '" fill="rgba(255,255,255,0.02)" rx="4"/>';

      Object.keys(buckets).forEach(function(idx) {
        var avg = buckets[parseInt(idx, 10)];
        var bucketY = (parseInt(idx, 10) * BUCKET_MS / totalMs) * H;
        var bucketH = Math.min((BUCKET_MS / totalMs) * H, H - bucketY);
        var dist = Math.abs(avg - 0.5);
        if (dist > 0.05) {
          var opacity = (dist * 0.6).toFixed(2);
          var color = avg < 0.5
            ? 'rgba(248,113,113,' + opacity + ')'
            : 'rgba(255,255,255,' + (dist * 0.42).toFixed(2) + ')';
          svg += '<rect x="2" y="' + bucketY.toFixed(1) + '" width="' + (W - 4) + '"'
            + ' height="' + Math.max(bucketH, 1).toFixed(1) + '" rx="2" fill="' + color + '"/>';
        }
      });

      Object.keys(participants).forEach(function(name) {
        var d = makeVerticalPath(participants[name]);
        if (d) svg += '<path d="' + d + '" fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>';
      });

      var avgPath = makeAvgPath(avgPts);
      if (avgPath) {
        svg += '<path d="' + avgPath + '" fill="none" stroke="rgba(255,255,255,0.80)" stroke-width="2"/>';
      }

      if (lowestIdx !== null) {
        var lowY = Math.min(((lowestIdx + 0.5) * BUCKET_MS / totalMs) * H, H);
        var lowX = lowestAvg * W;
        svg += '<line x1="0" y1="' + lowY.toFixed(1) + '" x2="' + W + '" y2="' + lowY.toFixed(1)
          + '" stroke="rgba(248,113,113,0.20)" stroke-width="1" stroke-dasharray="3 3"/>';
        svg += '<circle cx="' + lowX.toFixed(1) + '" cy="' + lowY.toFixed(1) + '" r="3" fill="#f87171" opacity="0.9"/>';
      }

      svg += '</svg>';
      return svg;
    }

    function showAnalysis(data) {
      var rows = data.rows || [];
      var phrases = data.phrases || [];

      var participants = {};
      rows.forEach(function(r) { participants[r.participant] = true; });
      var count = Object.keys(participants).length;

      var durationStr = '';
      if (rows.length) {
        var times = rows.map(function(r) { return Date.parse(r.timestamp); });
        var durationMin = Math.round((Math.max.apply(null, times) - Math.min.apply(null, times)) / 60000);
        if (durationMin > 0) durationStr = ' · ' + durationMin + ' min';
      }

      var dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      var parts = [];
      if (session.name) parts.push(session.name);
      parts.push(session.code);
      parts.push(dateStr);
      parts.push(count + ' participant' + (count !== 1 ? 's' : '') + durationStr);
      document.getElementById('analysis-meta').textContent = parts.join(' · ');

      var computed = rows.length ? computeBuckets(rows) : null;

      var transcriptEl = document.getElementById('analysis-transcript');
      while (transcriptEl.firstChild) transcriptEl.removeChild(transcriptEl.firstChild);

      if (!phrases.length) {
        var msg = document.createElement('span');
        msg.textContent = 'No transcript — transcription requires Chrome with microphone access.';
        msg.style.color = 'rgba(255,255,255,0.2)';
        msg.style.fontSize = '12px';
        transcriptEl.appendChild(msg);
      } else {
        phrases.forEach(function(phrase) {
          var span = document.createElement('span');
          span.textContent = phrase.text + ' ';
          if (computed) {
            // phrase.offsetMs is relative to session.startedAt; dot buckets are relative to first
            // dot timestamp (computed.t0). The ~2s offset between them is negligible for colouring.
            var bucketIdx = Math.floor(phrase.offsetMs / 5000);
            var avg = computed.buckets[bucketIdx] !== undefined ? computed.buckets[bucketIdx] : 0.5;
            if (avg < 0.35) {
              var opacity = ((0.35 - avg) / 0.35 * 0.30).toFixed(2);
              span.style.background = 'rgba(248,113,113,' + opacity + ')';
            } else if (avg < 0.6) {
              span.style.background = 'rgba(255,255,255,0.05)';
            }
          }
          transcriptEl.appendChild(span);
        });
      }

      showScreen('analysis');

      var sidebarEl = document.getElementById('analysis-sidebar');
      while (sidebarEl.firstChild) sidebarEl.removeChild(sidebarEl.firstChild);
      if (rows.length) {
        var H = transcriptEl.offsetHeight || 200;
        var svgStr = buildSidebar(rows, H, computed);
        var parser = new DOMParser();
        var doc = parser.parseFromString(svgStr, 'image/svg+xml');
        sidebarEl.appendChild(document.importNode(doc.documentElement, true));
      }
    }

    function newSession() {
      document.getElementById('session-name-input').value = '';
      var btn = document.getElementById('btn-create');
      btn.textContent = 'Create session';
      btn.disabled = false;
      showScreen('create');
    }

    function startTranscription() {
      document.getElementById('transcription-warning').style.display = 'none';
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        document.getElementById('transcription-warning').style.display = 'block';
        return;
      }
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-GB';
      recognition.onresult = function(event) {
        for (var i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            var phrase = event.results[i][0].transcript.trim();
            var offsetMs = Date.now() - session.startedAt;
            if (phrase) {
              api({ action: 'logPhrase', sheetId: session.sheetId, phrase: phrase, offsetMs: offsetMs });
            }
          }
        }
      };
      recognition.onend = function() {
        if (session && recognition) recognition.start();
      };
      recognition.onerror = function(event) {
        if (event.error === 'not-allowed') {
          document.getElementById('transcription-warning').style.display = 'block';
          recognition.onend = null;
          recognition = null;
        }
      };
      recognition.start();
    }

    function stopTranscription() {
      if (recognition) {
        recognition.onend = null;
        recognition.stop();
        recognition = null;
      }
    }

    function createSession() {
      var btn = document.getElementById('btn-create');
      btn.textContent = 'Creating…';
      btn.disabled = true;
      var name = document.getElementById('session-name-input').value.trim();
      api({ action: 'create' }).then(function(data) {
        if (data.error) {
          alert('Error: ' + data.error);
          btn.textContent = 'Create session';
          btn.disabled = false;
          return;
        }
        session = { code: data.code, sheetId: data.sheetId, name: name };
        localStorage.setItem('theroom_session', JSON.stringify(session));
        showWaiting(0);
      });
    }

    function showWaiting(count) {
      document.getElementById('name-waiting').textContent = session.name || '';
      document.getElementById('code-waiting').textContent = session.code;
      var joinUrl = window.location.origin + '/join/' + session.code;
      document.getElementById('url-waiting').textContent = joinUrl;
      clearQr();
      new QRCode(document.getElementById('qr'), {
        text: joinUrl,
        width: 160,
        height: 160,
        colorDark: '#000000',
        colorLight: '#ffffff'
      });
      document.getElementById('count-waiting').textContent = count;
      showScreen('waiting');
      startPolling();
    }

    function showRunning(count) {
      document.getElementById('name-running').textContent = session.name || '';
      document.getElementById('code-running').textContent = session.code;
      document.getElementById('count-running').textContent = count;
      showScreen('running');
      startPolling();
    }

    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(function() {
        api({ action: 'poll', sheetId: session.sheetId }).then(function(data) {
          if (data.error) return;
          if (data.status === 'WAITING') {
            document.getElementById('count-waiting').textContent = data.count || 0;
          } else if (data.status === 'ACTIVE') {
            document.getElementById('count-running').textContent = data.count || 0;
          }
        });
      }, 2000);
    }

    function startSession() {
      api({ action: 'start', sheetId: session.sheetId }).then(function(data) {
        if (data.error) { alert('Error: ' + data.error); return; }
        session.startedAt = Date.now();
        localStorage.setItem('theroom_session', JSON.stringify(session));
        var count = parseInt(document.getElementById('count-waiting').textContent) || 0;
        showRunning(count);
        startTranscription();
      });
    }

    function stopSession() {
      if (!confirm('Stop the session? This cannot be undone.')) return;
      stopTranscription();
      clearInterval(pollTimer);
      api({ action: 'stop', sheetId: session.sheetId })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          return api({ action: 'getData', sheetId: session.sheetId });
        })
        .then(function(data) {
          showAnalysis(data);
          localStorage.removeItem('theroom_session');
          session = null;
        })
        .catch(function(err) {
          alert('Error stopping session: ' + err.message);
          startPolling();
        });
    }

    // Restore from localStorage on page load
    var saved = localStorage.getItem('theroom_session');
    if (saved) {
      session = JSON.parse(saved);
      api({ action: 'poll', sheetId: session.sheetId }).then(function(data) {
        if (data.error || data.status === 'ENDED') {
          localStorage.removeItem('theroom_session');
          return;
        }
        if (data.status === 'ACTIVE') { showRunning(data.count || 0); startTranscription(); }
        else showWaiting(data.count || 0);
      });
    }
  </script>
</body>
</html>
