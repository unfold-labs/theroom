<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Room — Facilitator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    .screen.active { display: flex; }
    h1 { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.9); }
    .sub { font-size: 13px; color: rgba(255,255,255,0.4); text-align: center; line-height: 1.6; }
    .session-code { font-size: 48px; font-weight: 700; letter-spacing: 0.12em; }
    .join-url { font-size: 13px; color: rgba(255,255,255,0.4); }
    #qr-container { background: #fff; padding: 12px; border-radius: 8px; line-height: 0; }
    .count { font-size: 12px; color: rgba(255,255,255,0.3); }
    .count span { color: rgba(255,255,255,0.7); font-weight: 600; }
    .live-row { display: flex; align-items: center; gap: 8px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #6ee7a0; }
    .live-label { font-size: 12px; color: #6ee7a0; letter-spacing: 0.08em; }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.7; }
    .btn-primary { background: #fff; color: #111; }
    .btn-danger {
      background: transparent;
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.3);
    }
    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .divider { width: 100%; height: 1px; background: rgba(255,255,255,0.06); }
  </style>
</head>
<body>
  <script>
    var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbybMZwfF_MsWWLRETtzKv9rTI29EebZ73pLun4Nn8vIpXRuBNW4jePLNfOrxdSZX8Wz/exec';
  </script>

  <div id="screen-create" class="screen active">
    <h1>The Room</h1>
    <input
      type="text"
      id="session-name-input"
      placeholder="Session name (optional)"
      autocomplete="off"
      style="
        width:100%;
        background:rgba(255,255,255,0.06);
        border:1px solid rgba(255,255,255,0.12);
        border-radius:10px;
        padding:14px 16px;
        font-size:15px;
        color:#fff;
        text-align:center;
        outline:none;
        -webkit-appearance:none;
        font-family:inherit;
      "
    >
    <button class="btn-primary" id="btn-create" onclick="createSession()">Create session</button>
  </div>

  <div id="screen-waiting" class="screen">
    <div id="name-waiting" class="sub" style="min-height:1em"></div>
    <div id="code-waiting" class="session-code"></div>
    <div id="url-waiting" class="join-url"></div>
    <div id="qr-container"><div id="qr"></div></div>
    <div class="count"><span id="count-waiting">0</span> joined</div>
    <button class="btn-primary" onclick="startSession()">Start session</button>
  </div>

  <div id="screen-running" class="screen">
    <div id="name-running" class="sub" style="min-height:1em"></div>
    <div id="code-running" class="session-code" style="font-size:32px"></div>
    <div class="live-row">
      <div class="live-dot"></div>
      <div class="live-label">LIVE</div>
    </div>
    <div class="count"><span id="count-running">0</span> responding</div>
    <div id="transcription-warning" style="display:none;font-size:11px;color:rgba(255,255,255,0.3);text-align:center">
      Live transcription requires Chrome with microphone access
    </div>
    <div class="divider"></div>
    <button class="btn-danger" onclick="stopSession()">Stop session</button>
  </div>

  <div id="screen-analysis" class="screen">
    <div id="analysis-meta" class="sub"></div>
    <div id="analysis-chart" style="width:100%"></div>
    <button class="btn-secondary" onclick="newSession()">New session</button>
  </div>

  <script>
    var session = null;
    var pollTimer = null;
    var recognition = null;

    document.getElementById('session-name-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') createSession();
    });

    function api(params) {
      return fetch(SCRIPT_URL + '?' + new URLSearchParams(params).toString())
        .then(function(r) { return r.json(); });
    }

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });
      document.getElementById('screen-' + name).classList.add('active');
    }

    function clearQr() {
      var el = document.getElementById('qr');
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function buildChart(rows) {
      var W = 320, H = 180, CHART_H = 160, BUCKET_MS = 5000;

      if (!rows.length) {
        return '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">'
          + '<text x="160" y="90" fill="rgba(255,255,255,0.2)" font-size="11" '
          + 'text-anchor="middle" font-family="-apple-system,sans-serif">No data</text></svg>';
      }

      var times = rows.map(function(r) { return Date.parse(r.timestamp); });
      var t0 = Math.min.apply(null, times);
      var tEnd = Math.max.apply(null, times);
      var totalMs = Math.max(tEnd - t0, 1);

      // Bucket values into 5s bins
      var buckets = {};
      rows.forEach(function(r) {
        var idx = Math.floor((Date.parse(r.timestamp) - t0) / BUCKET_MS);
        if (!buckets[idx]) buckets[idx] = [];
        buckets[idx].push(parseFloat(r.value));
      });

      // Average each bucket, find lowest
      var lowestIdx = null, lowestAvg = Infinity;
      var points = Object.keys(buckets).map(function(idx) {
        var vals = buckets[idx];
        var avg = vals.reduce(function(a, b) { return a + b; }, 0) / vals.length;
        if (avg < lowestAvg) { lowestAvg = avg; lowestIdx = parseInt(idx); }
        var bucketMidMs = (parseInt(idx) + 0.5) * BUCKET_MS;
        return {
          x: Math.min((bucketMidMs / totalMs) * W, W),
          y: (1 - avg) * CHART_H
        };
      }).sort(function(a, b) { return a.x - b.x; });

      // Smooth bezier path through points
      function makePath(pts) {
        if (!pts.length) return '';
        var d = 'M' + pts[0].x.toFixed(1) + ',' + pts[0].y.toFixed(1);
        for (var i = 1; i < pts.length; i++) {
          var cx = ((pts[i - 1].x + pts[i].x) / 2).toFixed(1);
          d += ' C' + cx + ',' + pts[i-1].y.toFixed(1)
            + ' ' + cx + ',' + pts[i].y.toFixed(1)
            + ' ' + pts[i].x.toFixed(1) + ',' + pts[i].y.toFixed(1);
        }
        return d;
      }

      var linePath = makePath(points);
      var first = points[0], last = points[points.length - 1];
      var areaPath = linePath
        + ' L' + last.x.toFixed(1) + ',' + CHART_H
        + ' L' + first.x.toFixed(1) + ',' + CHART_H + ' Z';

      // Low point coords
      var lowX = lowestIdx !== null
        ? Math.min(((lowestIdx + 0.5) * BUCKET_MS / totalMs) * W, W) : null;
      var lowY = lowestAvg !== Infinity ? (1 - lowestAvg) * CHART_H : null;

      // Time label formatter
      function fmtMs(ms) {
        var s = Math.round(ms / 1000), m = Math.floor(s / 60);
        return m + ':' + ((s % 60) < 10 ? '0' : '') + (s % 60);
      }

      var svg = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">';
      svg += '<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">'
        + '<stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>'
        + '<stop offset="100%" stop-color="rgba(255,255,255,0)"/>'
        + '</linearGradient></defs>';
      svg += '<rect width="' + W + '" height="' + CHART_H + '" fill="rgba(255,255,255,0.02)" rx="6"/>';
      svg += '<line x1="0" y1="' + (CHART_H/2) + '" x2="' + W + '" y2="' + (CHART_H/2)
        + '" stroke="rgba(255,255,255,0.05)" stroke-width="1" stroke-dasharray="4 4"/>';
      svg += '<path d="' + areaPath + '" fill="url(#ag)"/>';
      svg += '<path d="' + linePath + '" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>';

      if (lowX !== null) {
        svg += '<line x1="' + lowX.toFixed(1) + '" y1="0" x2="' + lowX.toFixed(1) + '" y2="' + CHART_H
          + '" stroke="rgba(248,113,113,0.15)" stroke-width="1" stroke-dasharray="3 3"/>';
        svg += '<circle cx="' + lowX.toFixed(1) + '" cy="' + lowY.toFixed(1) + '" r="3" fill="#f87171" opacity="0.8"/>';
      }

      svg += '<line x1="0" y1="' + (H-2) + '" x2="' + W + '" y2="' + (H-2)
        + '" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
      svg += '<text x="2" y="' + (H-5) + '" fill="rgba(255,255,255,0.2)" font-size="8" font-family="-apple-system,sans-serif">0:00</text>';
      svg += '<text x="' + (W/2) + '" y="' + (H-5) + '" fill="rgba(255,255,255,0.2)" font-size="8" '
        + 'font-family="-apple-system,sans-serif" text-anchor="middle">' + fmtMs(totalMs / 2) + '</text>';
      svg += '<text x="' + (W-2) + '" y="' + (H-5) + '" fill="rgba(255,255,255,0.2)" font-size="8" '
        + 'font-family="-apple-system,sans-serif" text-anchor="end">' + fmtMs(totalMs) + '</text>';
      svg += '<text x="4" y="12" fill="rgba(255,255,255,0.2)" font-size="9" font-family="-apple-system,sans-serif">With you</text>';
      svg += '<text x="4" y="' + (CHART_H - 4) + '" fill="rgba(255,255,255,0.2)" font-size="9" font-family="-apple-system,sans-serif">Lost me</text>';
      svg += '</svg>';
      return svg;
    }

    function renderChart(rows) {
      var svgStr = buildChart(rows);
      var parser = new DOMParser();
      var doc = parser.parseFromString(svgStr, 'image/svg+xml');
      var chartEl = document.getElementById('analysis-chart');
      while (chartEl.firstChild) chartEl.removeChild(chartEl.firstChild);
      chartEl.appendChild(document.importNode(doc.documentElement, true));
    }

    function showAnalysis(rows) {
      var participants = {};
      rows.forEach(function(r) { participants[r.participant] = true; });
      var count = Object.keys(participants).length;

      var durationStr = '';
      if (rows.length) {
        var times = rows.map(function(r) { return Date.parse(r.timestamp); });
        var durationMin = Math.round((Math.max.apply(null, times) - Math.min.apply(null, times)) / 60000);
        if (durationMin > 0) durationStr = ' · ' + durationMin + ' min';
      }

      var dateStr = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
      var parts = [];
      if (session.name) parts.push(session.name);
      parts.push(session.code);
      parts.push(dateStr);
      parts.push(count + ' participant' + (count !== 1 ? 's' : '') + durationStr);

      document.getElementById('analysis-meta').textContent = parts.join(' · ');
      renderChart(rows);
      showScreen('analysis');
    }

    function newSession() {
      document.getElementById('session-name-input').value = '';
      var btn = document.getElementById('btn-create');
      btn.textContent = 'Create session';
      btn.disabled = false;
      showScreen('create');
    }

    function startTranscription() {
      document.getElementById('transcription-warning').style.display = 'none';
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        document.getElementById('transcription-warning').style.display = 'block';
        return;
      }
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-GB';
      recognition.onresult = function(event) {
        for (var i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            var phrase = event.results[i][0].transcript.trim();
            var offsetMs = Date.now() - session.startedAt;
            if (phrase) {
              api({ action: 'logPhrase', sheetId: session.sheetId, phrase: phrase, offsetMs: offsetMs });
            }
          }
        }
      };
      recognition.onend = function() {
        if (session && recognition) recognition.start();
      };
      recognition.onerror = function(event) {
        if (event.error === 'not-allowed') {
          document.getElementById('transcription-warning').style.display = 'block';
          recognition.onend = null;
          recognition = null;
        }
      };
      recognition.start();
    }

    function stopTranscription() {
      if (recognition) {
        recognition.onend = null;
        recognition.stop();
        recognition = null;
      }
    }

    function createSession() {
      var btn = document.getElementById('btn-create');
      btn.textContent = 'Creating…';
      btn.disabled = true;
      var name = document.getElementById('session-name-input').value.trim();
      api({ action: 'create' }).then(function(data) {
        if (data.error) {
          alert('Error: ' + data.error);
          btn.textContent = 'Create session';
          btn.disabled = false;
          return;
        }
        session = { code: data.code, sheetId: data.sheetId, name: name };
        localStorage.setItem('theroom_session', JSON.stringify(session));
        showWaiting(0);
      });
    }

    function showWaiting(count) {
      document.getElementById('name-waiting').textContent = session.name || '';
      document.getElementById('code-waiting').textContent = session.code;
      var joinUrl = window.location.origin + '/join/' + session.code;
      document.getElementById('url-waiting').textContent = joinUrl;
      clearQr();
      new QRCode(document.getElementById('qr'), {
        text: joinUrl,
        width: 160,
        height: 160,
        colorDark: '#000000',
        colorLight: '#ffffff'
      });
      document.getElementById('count-waiting').textContent = count;
      showScreen('waiting');
      startPolling();
    }

    function showRunning(count) {
      document.getElementById('name-running').textContent = session.name || '';
      document.getElementById('code-running').textContent = session.code;
      document.getElementById('count-running').textContent = count;
      showScreen('running');
      startPolling();
    }

    function startPolling() {
      clearInterval(pollTimer);
      pollTimer = setInterval(function() {
        api({ action: 'poll', sheetId: session.sheetId }).then(function(data) {
          if (data.error) return;
          if (data.status === 'WAITING') {
            document.getElementById('count-waiting').textContent = data.count || 0;
          } else if (data.status === 'ACTIVE') {
            document.getElementById('count-running').textContent = data.count || 0;
          }
        });
      }, 2000);
    }

    function startSession() {
      api({ action: 'start', sheetId: session.sheetId }).then(function(data) {
        if (data.error) { alert('Error: ' + data.error); return; }
        session.startedAt = Date.now();
        localStorage.setItem('theroom_session', JSON.stringify(session));
        var count = parseInt(document.getElementById('count-waiting').textContent) || 0;
        showRunning(count);
        startTranscription();
      });
    }

    function stopSession() {
      if (!confirm('Stop the session? This cannot be undone.')) return;
      stopTranscription();
      clearInterval(pollTimer);
      api({ action: 'stop', sheetId: session.sheetId })
        .then(function(data) {
          if (data.error) throw new Error(data.error);
          return api({ action: 'getData', sheetId: session.sheetId });
        })
        .then(function(data) {
          showAnalysis(data.rows || []);
          localStorage.removeItem('theroom_session');
          session = null;
        })
        .catch(function(err) {
          alert('Error stopping session: ' + err.message);
          startPolling();
        });
    }

    // Restore from localStorage on page load
    var saved = localStorage.getItem('theroom_session');
    if (saved) {
      session = JSON.parse(saved);
      api({ action: 'poll', sheetId: session.sheetId }).then(function(data) {
        if (data.error || data.status === 'ENDED') {
          localStorage.removeItem('theroom_session');
          return;
        }
        if (data.status === 'ACTIVE') { showRunning(data.count || 0); startTranscription(); }
        else showWaiting(data.count || 0);
      });
    }
  </script>
</body>
</html>
